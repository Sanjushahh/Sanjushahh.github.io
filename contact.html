<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Send Us a Message</h1>
        <p>Please fill in the form below to get in touch with us</p>
    
        <input type="text" class="left" name="First name" placeholder="First Name">
        <input type="text" class="right" placeholder="Last Name">
        <br>
        <input type="text"  class="left" placeholder="Email Address">
        <input type="text" class="right" placeholder="Phone Number">
        <br>
        <textarea 
        class="left" class="text" placeholder="Message"></textarea>
        <br>
        <p class="gen">Gender</p> <input type="radio" name="gender">Male
         <input type="radio" name="gender">Female
         <br>
         <input class="checkbox" type="checkbox">I've read and agree with <u>Terms of Serive</u>and <u>Privacy Policy</u>
     <br> <button>Submit</button>
        </div>
        <style>
            div{
                border: solid 2px black;
                height: 450px;
                width: 500px;
                border-radius: 20px;
                background-color: white;
                
                
            }
            body{
                justify-content: center;
                align-items: center;
                height: 100vh;
                display: flex;
            }
            .left{
                margin-left: 60px;
                margin-top: 20px;
                height: 40px;
                border-radius: 5px;
                border: none;
            }
            .right{
                height: 40px;
                border-radius:5px ;
                margin-left: 20px;
                border: none;

            }
            textarea{
                background-color:rgb(242, 242, 242) ;
                width: 355px;
                height: 200px;
            }
            input{
                background-color: rgb(242, 242, 242);
                

            }
            h1{
                margin-left: 60px;
            }
            p{
                margin-left: 60px;
            }
            .gen{
                display: inline;
            }
            .checkbox{
                margin-left: 60px;
                margin-top: 20px;

            }
            button{
                height: 40px;
                background-color: black;
                color: white;
                margin-left: 60px;
                border-radius: 6px;
                margin-top: 10px;
            }
            
        </style>
    
    
</body>
</html>
